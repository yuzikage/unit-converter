<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <title>Unit Converter</title>
    </head>
    <body>

        <div>
            <h1>Welcome to the Unit Converter</h1>
            <h2>Convert between different units of measurement</h2>
            <h3>Enter the value you want to convert:</h3>
            <input type="number" id="inputValue" placeholder="Enter value">
            <h3>Select the unit you want to convert from:</h3>
            <select id="fromUnit">
                <option value="meters">Meters</option>
                <option value="kilometers">Kilometers</option>
                <option value="miles">Miles</option>
                <option value="feet">Feet</option>
            </select>
            <h3>Select the unit you want to convert to:</h3>
            <select id="toUnit">
                <option value="meters">Meters</option>
                <option value="kilometers">Kilometers</option>
                <option value="miles">Miles</option>
                <option value="feet">Feet</option>
            </select>
            <button id="convertButton">Convert</button>
            <h3 id="result"></h3>
            
        </div>

        <script src="index.js"></script>
    </body>
</html>
